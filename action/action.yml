name: "Build Slidev Decks"
description: "Build all Slidev presentations and generate an index page"
branding:
  icon: "monitor"
  color: "blue"

inputs:
  base:
    description: "Base path for deployment (e.g., /talks/)"
    required: false
    default: "/"
  install-command:
    description: "Command to install dependencies"
    required: false
    default: "npm ci"
  slidev-decks-version:
    description: "Version of slidev-decks to install globally (set to 'local' to use the version from your package.json)"
    required: false
    default: "local"

outputs:
  dist-path:
    description: "Path to the built output"
    value: ${{ steps.build.outputs.dist-path }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: "22"

    - name: Install dependencies
      shell: bash
      run: ${{ inputs.install-command }}

    - name: Install slidev-decks
      shell: bash
      env:
        SLIDEV_DECKS_VERSION: ${{ inputs.slidev-decks-version }}
      run: |
        if [ "$SLIDEV_DECKS_VERSION" = "local" ]; then
          echo "Using locally installed slidev-decks from project dependencies"
        else
          npm install -g "slidev-decks@${SLIDEV_DECKS_VERSION}"
        fi

    - name: Install Playwright for PDF export
      shell: bash
      run: npx playwright install chromium
      continue-on-error: true

    - name: Build all decks
      id: build
      shell: bash
      env:
        SLIDEV_DECKS_VERSION: ${{ inputs.slidev-decks-version }}
        BASE_PATH: ${{ inputs.base }}
      run: |
        if [ "$SLIDEV_DECKS_VERSION" = "local" ]; then
          npx slidev-decks build --all --base "$BASE_PATH" --continue-on-error
        else
          slidev-decks build --all --base "$BASE_PATH" --continue-on-error
        fi
        echo "dist-path=dist" >> $GITHUB_OUTPUT

    - name: List built decks
      shell: bash
      run: ls -la dist/
