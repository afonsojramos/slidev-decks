<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'Menlo', monospace; }
      .dim { fill: #64748b; }
      .text { fill: #e2e8f0; }
      .green { fill: #4ade80; }
      .cyan { fill: #22d3ee; }
      .blue { fill: #60a5fa; }
      .purple { fill: #a78bfa; }
      .yellow { fill: #fbbf24; }
      .bold { font-weight: 700; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" rx="0"/>

  <!-- Terminal window -->
  <rect x="60" y="40" width="1080" height="550" rx="12" fill="#1a1b26" stroke="#2d2f3d" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="60" y="40" width="1080" height="36" rx="12" fill="#24263a"/>
  <rect x="60" y="64" width="1080" height="12" fill="#24263a"/>
  <circle cx="84" cy="58" r="6" fill="#ff5f57"/>
  <circle cx="104" cy="58" r="6" fill="#febc2e"/>
  <circle cx="124" cy="58" r="6" fill="#28c840"/>
  <text x="600" y="62" class="mono dim" font-size="12" text-anchor="middle">slidev-decks</text>

  <!-- Terminal content -->
  <!-- sd list -->
  <text x="90" y="105" class="mono">
    <tspan class="green">$</tspan>
    <tspan class="text"> sd list</tspan>
  </text>

  <text x="90" y="140" class="mono dim" font-size="13">
    <tspan>  Name                      Title</tspan>
  </text>
  <text x="90" y="158" class="mono dim" font-size="13">
    <tspan>  ────────────────────────  ────────────────────────────────</tspan>
  </text>
  <text x="90" y="176" class="mono" font-size="13">
    <tspan class="bold text">  2026-03-ai-and-work      </tspan>
    <tspan class="dim">[2026-03] </tspan>
    <tspan class="text">The Role of AI in People's Lives</tspan>
  </text>
  <text x="90" y="194" class="mono" font-size="13">
    <tspan class="bold text">  2026-04-react-deep-dive  </tspan>
    <tspan class="dim">[2026-04] </tspan>
    <tspan class="text">React Server Components Deep Dive</tspan>
  </text>
  <text x="90" y="212" class="mono" font-size="13">
    <tspan class="bold text">  2026-05-typescript-tips  </tspan>
    <tspan class="dim">[2026-05] </tspan>
    <tspan class="text">TypeScript Tips and Tricks</tspan>
  </text>

  <text x="90" y="240" class="mono dim" font-size="13">  3 decks found</text>

  <!-- sd your-talk -->
  <text x="90" y="280" class="mono">
    <tspan class="green">$</tspan>
    <tspan class="text"> sd typescript</tspan>
  </text>

  <text x="90" y="310" class="mono" font-size="13">
    <tspan class="green">  ✓</tspan>
    <tspan class="text"> Matched: </tspan>
    <tspan class="bold text">2026-05-typescript-tips</tspan>
  </text>

  <text x="90" y="340" class="mono dim" font-size="13">└  Starting 2026-05-typescript-tips</text>

  <!-- Slidev banner -->
  <text x="90" y="380" class="mono" font-size="14">
    <tspan class="cyan">  ●</tspan>
    <tspan class="blue">■</tspan>
    <tspan class="yellow">▲</tspan>
  </text>
  <text x="90" y="400" class="mono bold text" font-size="14">  Slidev  <tspan class="blue" font-weight="400">v52.14.1</tspan></text>

  <text x="90" y="430" class="mono" font-size="13">
    <tspan class="dim">  theme       </tspan>
    <tspan class="green">@slidev/theme-default</tspan>
  </text>
  <text x="90" y="450" class="mono" font-size="13">
    <tspan class="dim">  entry       </tspan>
    <tspan class="text">slides.md</tspan>
  </text>

  <text x="90" y="480" class="mono" font-size="13">
    <tspan class="dim">  public slide show  </tspan>
    <tspan class="text">  > </tspan>
    <tspan class="cyan">http://localhost:3030/</tspan>
  </text>
  <text x="90" y="500" class="mono" font-size="13">
    <tspan class="dim">  presenter mode     </tspan>
    <tspan class="text">  > </tspan>
    <tspan class="blue">http://localhost:3030/presenter/</tspan>
  </text>

  <!-- Branding -->
  <text x="90" y="560" class="mono purple" font-size="16">slidev-decks</text>
  <text x="260" y="560" class="mono dim" font-size="14">Manage multiple Slidev presentations with ease</text>
</svg>
